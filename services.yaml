# For configuration options and examples, please see:
# https://gethomepage.dev/configs/services/

- Home Automation:
  - HA1:
    - Temperature:
        description: Temperatures
        icon: "mdi-thermometer-lines-#e53935"
        widget:
          type: customapi
          url: http://192.168.3.40:8123/api/template
          method: POST
          headers:
            Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJmMGJjNDI0YTFlMTg0YjIwYTg2ZGVmNzc1M2YzNzlhOCIsImlhdCI6MTc2MTgzMTMxNCwiZXhwIjoyMDc3MTkxMzE0fQ.PxJo-gUl10PUEX3yMN9TGWVPV9ph9Tm6mj48GBLLN0c
            Content-Type: application/json
          requestBody:
            template: |
              {
                "ute": {{ states('sensor.shelly1_f4cfa2e5e315_temperature') | tojson }},
                "basement": {{ states('sensor.shelly1_f4cfa2e5e315_temperature_3') | tojson }},
                "livingroom": {{ states('sensor.luftpump_indoor_temperature') | tojson }},
                "luftpump_set": {{ state_attr('climate.luftpump', 'temperature') | tojson }}
              }
          mappings:
            - field: ute
              label: Outside
              prefix: 🌡
              suffix: °C
            - field: basement
              label: Basement
              prefix: 🌡
              suffix: °C
            - field: livingroom
              label: Livingroom
              prefix: 🌡
              suffix: °C
            - field: luftpump_set
              label: Target
              prefix: 🌡
              suffix: °C

  - HA2:   
    - Solar:
        description: Solar system
        icon: "mdi-solar-power-variant-#ffca28"
        widget:
          type: customapi
          url: http://192.168.3.40:8123/api/template
          method: POST
          headers:
            Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJmMGJjNDI0YTFlMTg0YjIwYTg2ZGVmNzc1M2YzNzlhOCIsImlhdCI6MTc2MTgzMTMxNCwiZXhwIjoyMDc3MTkxMzE0fQ.PxJo-gUl10PUEX3yMN9TGWVPV9ph9Tm6mj48GBLLN0c
            Content-Type: application/json
          requestBody:
            template: |
              {
                "battery": {{ states('sensor.fsp_ne_163447792_state_of_charge') | tojson }},
                "pv_output": {{ (states('sensor.fsp_ne_163447768_flow_solar_power') ~ 'kW') | tojson }},
                "consumtion": {{ (states('sensor.fsp_ne_163447768_flow_load_power') ~ 'kW') | tojson }},
                "battery_consumtion": {{ (states('sensor.fsp_ne_163447768_flow_battery_power') ~ 'kW') | tojson }},
                "todays_income": {{ (states('sensor.fsp_ne_163447768_today_income') ~ 'kr') | tojson }}
              }
          mappings:
            - field: battery
              label: Battery
              format: percent
            - field: pv_output
              label: panels
            - field: consumtion
              label: consumtion
            - field: todays_income
              label: Income 
            
  - HA3:      
    - Roborock Qrevo:
        description: Vacuum robot
        icon: /icons/roborock.png
        widget:
          type: customapi
          url: http://192.168.3.40:8123/api/template
          method: POST
          headers:
            Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJmMGJjNDI0YTFlMTg0YjIwYTg2ZGVmNzc1M2YzNzlhOCIsImlhdCI6MTc2MTgzMTMxNCwiZXhwIjoyMDc3MTkxMzE0fQ.PxJo-gUl10PUEX3yMN9TGWVPV9ph9Tm6mj48GBLLN0c
            Content-Type: application/json
          requestBody:
            template: |
              {
                "status": {{ states('sensor.roborock_qrevo_status') | tojson }},
                "dock": {{ states('sensor.roborock_qrevo_dock_dockningsfel') | tojson }},
                "battery": {{ (states('sensor.roborock_qrevo_batteri') ~ '%') | tojson }},
                "last_clean": {{ states('sensor.roborock_qrevo_sluttid_for_senaste_stadningen') | tojson }}
              }
          mappings:
            - field: status
              label: Status
              remap:
                - value: charging
                  to: 🔋
                - value: idle
                  to: ⏳
                - value: cleaning
                  to: 🧹
                - value: washing_the_mop
                  to: 🚿
                - value: charger_disconnected
                  to: ❌🔌
            - field: dock
              label: Dock
              remap:
                - value: ok
                  to: ✅
                - value: waste_water_tank_full
                  to: 💩
                - value: water_empty
                  to: 🚱
                - value: duct_blockage
                  to: ❌🌬️
            - field: battery
              label: Battery
            - field: last_clean
              label: Last clean
              format: relativeDate

  - HA4: 
    - Sector Alarm:
        description: Alarm system
        icon: /icons/sector-alarm.png
        widget:
          type: customapi
          url: http://192.168.3.40:8123/api/template
          method: POST
          headers:
            Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJmMGJjNDI0YTFlMTg0YjIwYTg2ZGVmNzc1M2YzNzlhOCIsImlhdCI6MTc2MTgzMTMxNCwiZXhwIjoyMDc3MTkxMzE0fQ.PxJo-gUl10PUEX3yMN9TGWVPV9ph9Tm6mj48GBLLN0c
            Content-Type: application/json
          requestBody: 
            template: |
              {% set ts = state_attr('input_datetime.sector_alarm_true_change','timestamp') %}
              {
                "status": {{ states('input_select.sector_alarm_true_status') | tojson }},
                "changed_iso": {{ ((ts | as_datetime | as_local).isoformat() if ts is not none else none) | tojson }}
              }
          mappings:
            - field: status
              remap: 
                - value: disarmed
                  to: Disarmed
                - value: armed_away
                  to: Fully armed
                - value: armed_home
                  to: Perimeter armed
            - field: changed_iso
              format: relativeDate

    - Home Assistant:
        description: Home automation
        icon: home-assistant.png
        href: https://homeassistant.fua.nu
        server: local-docker
        container: homeassistant
        siteMonitor: http://192.168.3.40:8123
        widget:
          type: homeassistant
          url: http://192.168.3.40:8123
          key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJmMGJjNDI0YTFlMTg0YjIwYTg2ZGVmNzc1M2YzNzlhOCIsImlhdCI6MTc2MTgzMTMxNCwiZXhwIjoyMDc3MTkxMzE0fQ.PxJo-gUl10PUEX3yMN9TGWVPV9ph9Tm6mj48GBLLN0c
          custom:
            - template: "{{ relative_time(states('sensor.backup_last_successful_automatic_backup') | as_datetime) ~ ' ago' }}"
              label: Last backup

