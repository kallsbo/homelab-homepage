- Torrents:
  - Superbits:
      id: superbits
      description: Superbits.org - Sveriges största bittorrent tracker
      icon: the-pirate-bay.png
      href: https://login.superbits.org/user/60688/klyra
      widgets:
        - type: customapi
          url: http://n8n:5678/webhook/superbits?userStats=true
          method: GET
          refreshInterval: 20000
          headers:
            x-token: oo7v8J2fXrbLqmBEYAA2TZDmuz3tezPj7Vl5e5CiPmk3skdmsm2Madp1P9YyqJEm
          mappings:
            - field: userStats.warned
              label: Warned
              format: String
              remap:
              - value: no
                to: ✅
              - any: true # will map all other values
                to: ⛔
            - field: userStats.ratio.pretty
              label: Ratio
              format: string
            - field: userStats.downloaded.human
              label: Downloaded
              format: string
            - field: userStats.uploaded.human
              label: Uploaded
              format: string
            - field: userStats.last_access
              label: Last Access
              format: relativeDate

        - type: customapi
          url: http://n8n:5678/webhook/superbits?userInfo=true
          method: GET
          refreshInterval: 20000
          headers:
            x-token: oo7v8J2fXrbLqmBEYAA2TZDmuz3tezPj7Vl5e5CiPmk3skdmsm2Madp1P9YyqJEm
          mappings:
            - field: user.bonuspoang
              label: Bonus
              format: number
            - field: user.leechbonus
              label: Leech Bonus
              format: percent
            - field: user.last_access
              label: Last Access
              format: relativeDate

        - type: customapi
          url: http://n8n:5678/webhook/superbits?userStatus=true
          method: GET
          refreshInterval: 20000
          headers:
            x-token: oo7v8J2fXrbLqmBEYAA2TZDmuz3tezPj7Vl5e5CiPmk3skdmsm2Madp1P9YyqJEm
          mappings:
            - field: user.hnrwarns
              label: HnR Warnings
              format: number
            - field: user.notifs.length
              label: Notifications
              format: number

        - type: customapi
          url: http://n8n:5678/webhook/superbits?HnRInfo=true
          method: GET
          refreshInterval: 20000
          headers:
            x-token: oo7v8J2fXrbLqmBEYAA2TZDmuz3tezPj7Vl5e5CiPmk3skdmsm2Madp1P9YyqJEm
          display: dynamic-list
          mappings:
            items: HnR
            name: nameSlug
            label: statusSlug

